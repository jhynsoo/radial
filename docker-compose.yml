services:
  radial-db:
    image: postgres:17-alpine
    container_name: radial-db
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-radial} -d $${POSTGRES_DB:-radial}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  radial-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    container_name: radial-api
    image: ${RADIAL_API_IMAGE:-radial-api:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${API_CONTAINER_PORT:-3001}
    restart: unless-stopped
    depends_on:
      radial-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  radial-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    container_name: radial-web
    image: ${RADIAL_WEB_IMAGE:-radial-web:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${WEB_CONTAINER_PORT:-3000}
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    depends_on:
      radial-api:
        condition: service_healthy

  radial-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-migrator
    container_name: radial-migrate
    image: ${RADIAL_MIGRATOR_IMAGE:-radial-api-migrator:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: pnpm --filter api db:migrate:deploy
    depends_on:
      radial-db:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"

volumes:
  postgres-data:

networks:
  default:
    name: radial-network
