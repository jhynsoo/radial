services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    image: ${RADIAL_API_IMAGE:-radial-api:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${API_CONTAINER_PORT:-3001}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PUBLISHED_PORT:-3001}:${API_CONTAINER_PORT:-3001}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    image: ${RADIAL_WEB_IMAGE:-radial-web:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${WEB_CONTAINER_PORT:-3000}
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PUBLISHED_PORT:-3000}:${WEB_CONTAINER_PORT:-3000}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-migrator
    image: ${RADIAL_MIGRATOR_IMAGE:-radial-api-migrator:latest}
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: pnpm --filter api db:migrate:deploy
    profiles:
      - tools
    restart: "no"
