services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-radial} -d $${POSTGRES_DB:-radial}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: ${RADIAL_API_DEV_IMAGE:-radial-api:dev}
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${API_CONTAINER_PORT:-3001}
    command: pnpm --filter api dev
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PUBLISHED_PORT:-3001}:${API_CONTAINER_PORT:-3001}"
    volumes:
      - .:/app
      - pnpm-store:/pnpm/store
      - root-node-modules:/app/node_modules
      - api-node-modules:/app/apps/api/node_modules
      - web-node-modules:/app/apps/web/node_modules
    restart: "no"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: ${RADIAL_WEB_DEV_IMAGE:-radial-web:dev}
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${WEB_CONTAINER_PORT:-3000}
    command: pnpm --filter web exec next dev --turbopack --hostname 0.0.0.0 --port 3000
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PUBLISHED_PORT:-3000}:${WEB_CONTAINER_PORT:-3000}"
    volumes:
      - .:/app
      - pnpm-store:/pnpm/store
      - root-node-modules:/app/node_modules
      - api-node-modules:/app/apps/api/node_modules
      - web-node-modules:/app/apps/web/node_modules
    restart: "no"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  pnpm-store:
  root-node-modules:
  api-node-modules:
  web-node-modules:
