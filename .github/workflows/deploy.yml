name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.9"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/jhynsoo
  DATABASE_URL: postgresql://radial:radial@localhost:5432/radial?schema=public
  TRACKER_PUBLIC_URL: http://localhost:3001/api/v1
  TRACKER_API_BASE_URL: http://localhost:3001/api/v1
  TRACKER_API_KEY: ci-tracker-api-key

jobs:
  deploy:
    name: Test, build, publish, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test API
        run: pnpm --filter api test

      - name: Test web
        run: pnpm --filter web test -- --run

      - name: Build
        run: pnpm build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api-runner
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/radial-api:main
            ${{ env.IMAGE_NAMESPACE }}/radial-api:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web-runner
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/radial-web:main
            ${{ env.IMAGE_NAMESPACE }}/radial-web:${{ github.sha }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api-migrator
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/radial-migrator:main
            ${{ env.IMAGE_NAMESPACE }}/radial-migrator:${{ github.sha }}

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            mkdir -p /opt/radial
            test -f /opt/radial/.env

      - name: Upload compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: docker-compose.yml
          target: /opt/radial
          overwrite: true

      - name: Deploy to Ubuntu server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /opt/radial

            docker compose config --quiet
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u jhynsoo --password-stdin

            docker compose pull radial-api radial-web radial-migrate
            docker compose up -d radial-db
            docker compose --profile tools run --rm radial-migrate
            docker compose up -d radial-api radial-web
            docker image prune -f
